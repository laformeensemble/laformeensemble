<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Form'Ensemble</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  color:#4ade80;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  z-index:1000;
}

/* NAV */
nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:700px;
  background:rgba(17,24,39,0.95);
  border-radius:20px;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:12px;
}

/* SECTIONS */
section{
  display:none;
  min-height:100vh;
  padding:90px 15px 120px;
}

section.active{
  display:block;
}

/* CARDS */
.card{
  background:#1f2937;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

/* GALLERY */
#images{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.gallery-card{
  background:#1f2937;
  border-radius:12px;
  overflow:hidden;
}

.gallery-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.download-btn{
  width:100%;
  padding:8px;
  border:none;
  background:#4ade80;
  font-weight:bold;
}

/* LOGIN FULL SCREEN */
#login{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9));
  z-index:2000;
}

#login input{
  width:80%;
  max-width:300px;
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
}

#login button{
  width:80%;
  max-width:300px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4ade80;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">La Form'Ensemble 🌿</div>

<!-- HOME -->
<section id="home" class="active">
  <h2>Accueil</h2>
  <div class="card">Bienvenue 🌿</div>
</section>

<!-- EVENTS -->
<section id="events">
  <h2>Événements</h2>
  <div id="list"></div>
</section>

<!-- GALLERY -->
<section id="gallery">
  <h2>Galerie 📸</h2>

  <div id="galBlocked">🔒 Connexion requise</div>

  <div id="galContent" style="display:none">

    <input type="file" id="imageFile">
    <button onclick="uploadImage()">Uploader</button>

    <div id="images"></div>

  </div>
</section>

<!-- GAZETTE -->
<section id="gazette">
  <h2>Gazette 📰</h2>

  <div id="gazBlocked">🔒 Connexion requise</div>

  <div id="gazContent" style="display:none">
    <div class="card">PDF ici</div>
  </div>
</section>

<!-- LOGIN -->
<section id="login">
  <h2>Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</section>

<!-- NAV -->
<nav>
<button onclick="show('home')">🏠</button>
<button onclick="show('events')">📅</button>
<button onclick="show('gallery')">📸</button>
<button onclick="show('gazette')">📰</button>
<button onclick="show('login')">🔐</button>
</nav>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC9Onkj0aUzHoQ4LQI5phaMFlNqTbQM74o",
  authDomain: "la-form-ensemble.firebaseapp.com",
  projectId: "la-form-ensemble"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* NAVIGATION */
function show(page){

  const protectedPages = ["gallery","gazette"];
  const user = firebase.auth().currentUser;

  if(protectedPages.includes(page) && !user){
    page = "login";
  }

  document.querySelectorAll("section")
  .forEach(s => s.classList.remove("active"));

  document.getElementById(page).classList.add("active");

  window.scrollTo(0,0);

}

/* LOGIN */
function login(){

  firebase.auth()
  .signInWithEmailAndPassword(email.value, password.value)
  .then(()=>show("home"))
  .catch(e=>alert(e.message));

}

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{

  if(user){

    galBlocked.style.display="none";
    galContent.style.display="block";

    gazBlocked.style.display="none";
    gazContent.style.display="block";

  }else{

    galBlocked.style.display="block";
    galContent.style.display="none";

    gazBlocked.style.display="block";
    gazContent.style.display="none";

  }

});

/* UPLOAD */
function uploadImage(){

  const file = imageFile.files[0];
  const reader = new FileReader();

  reader.onload = e=>{

    db.collection("gallery").add({
      url:e.target.result,
      created:Date.now()
    });

  };

  reader.readAsDataURL(file);

}

/* LOAD IMAGES */
db.collection("gallery")
.orderBy("created","desc")
.onSnapshot(snap=>{

  images.innerHTML="";

  snap.forEach(doc=>{

    const url = doc.data().url;

    images.innerHTML += `
      <div class="gallery-card">
        <img src="${url}">
        <button class="download-btn"
        onclick="downloadImage('${url}')">
        Télécharger
        </button>
      </div>
    `;

  });

});

/* DOWNLOAD */
function downloadImage(url){

  const a = document.createElement("a");
  a.href = url;
  a.download = "image.jpg";
  a.click();

}

/* EVENTS */
db.collection("events")
.orderBy("created","desc")
.onSnapshot(snap=>{

  list.innerHTML="";

  snap.forEach(doc=>{

    const e = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${e.title||""}</h3>
        <p>${e.date||""}</p>
        <p>${e.place||""}</p>
      </div>
    `;

  });

});

</script>

</body>
</html>
