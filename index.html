<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Form'Ensemble</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1220;
  color:white;
}

/* TOP */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  text-align:center;
  padding:16px;
  font-size:22px;
  font-weight:bold;
  color:#4ade80;
  background:rgba(15,23,42,0.92);
  backdrop-filter:blur(12px);
  z-index:1000;
}

/* NAV */
nav{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:850px;
  background:rgba(17,24,39,0.95);
  border-radius:25px;
  display:flex;
  justify-content:space-around;
  padding:10px;
  z-index:1000;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:13px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  transition:0.2s;
}

nav button:hover{
  transform:scale(1.08);
  color:#4ade80;
}

/* SECTIONS */
section{
  display:none;
  min-height:100vh;
  padding:100px 20px 120px;
}

section.active{
  display:block;
}

/* HOME */
#home{
  background:
  linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.7)),
  url("fond.jpg");

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:42px;
  margin-bottom:10px;
}

.hero p{
  font-size:18px;
  max-width:700px;
  margin:auto;
}

/* CARD */
.card{
  background:#1f2937;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
}

/* EVENTS */
.event-card{
  background:#1f2937;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
}

.participate-btn{
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4ade80;
  color:#0b1220;
  font-weight:bold;
}

/* GALLERY */
#images{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  margin-top:20px;
}

.gallery-card{
  background:#1f2937;
  border-radius:15px;
  overflow:hidden;
}

.gallery-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.download-btn{
  width:100%;
  padding:10px;
  border:none;
  background:#4ade80;
  font-weight:bold;
  cursor:pointer;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

/* BUTTON */
.main-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#4ade80;
  color:#0b1220;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

/* LOGIN */
.login-box{
  max-width:400px;
  margin:120px auto;
  background:#1f2937;
  padding:25px;
  border-radius:20px;
  text-align:center;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
La Form'Ensemble 🌿
</div>

<!-- HOME -->
<section id="home" class="active">

<div class="hero">

<h1>La Form'Ensemble 🌿</h1>

<p>
Sport, Santé, Bien-Être
</p>

</div>

</section>

<!-- EVENTS -->
<section id="events">

<h2>Événements 📅</h2>

<div id="list"></div>

</section>

<!-- GALLERY -->
<section id="gallery">

<h2>Galerie 📸</h2>

<div id="galContent" style="display:none;">

<input type="file" id="imageFile">

<button class="main-btn" onclick="uploadImage()">
Uploader une image
</button>

<div id="images"></div>

</div>

</section>

<!-- GAZETTE -->
<section id="gazette">

<h2>Gazette 📰</h2>

<div id="gazContent" style="display:none;">

<div class="card">
https://drive.google.com/file/d/1gqvaq3QcIzlep90oV7FTBYvJY2uNq6PB/view?usp=sharing/preview
</div>

</div>

</section>

<!-- LOGIN -->
<section id="login">

<div class="login-box">

<h2>Connexion 🔐</h2>

<input
id="email"
placeholder="Email"
type="email"
>

<input
id="password"
type="password"
placeholder="Mot de passe"
>

<button class="main-btn" onclick="login()">
Se connecter
</button>

</div>

</section>

<!-- NAV -->
<nav>

<button onclick="show('home')">
🏠
<span>Accueil</span>
</button>

<button onclick="show('events')">
📅
<span>Events</span>
</button>

<button onclick="show('gallery')">
📸
<span>Galerie</span>
</button>

<button onclick="show('gazette')">
📰
<span>Gazette</span>
</button>

<button onclick="show('login')">
🔐
<span>Connexion</span>
</button>

<button onclick="logout()">
🚪
<span>Logout</span>
</button>

</nav>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC9Onkj0aUzHoQ4LQI5phaMFlNqTbQM74o",
  authDomain: "la-form-ensemble.firebaseapp.com",
  projectId: "la-form-ensemble"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* ÉTAT CONNEXION */
let isLogged = false;

/* AUTH */
firebase.auth().onAuthStateChanged(user => {

  const gal =
  document.getElementById("galContent");

  const gaz =
  document.getElementById("gazContent");

  if(user){

    isLogged = true;

    if(gal){
      gal.style.display = "block";
    }

    if(gaz){
      gaz.style.display = "block";
    }

  }else{

    isLogged = false;

    if(gal){
      gal.style.display = "none";
    }

    if(gaz){
      gaz.style.display = "none";
    }

  }

});

/* NAVIGATION */
function show(page){

  /* 🔒 BLOQUE GALLERY + GAZETTE */
  if(
    (page === "gallery" || page === "gazette")
    &&
    !isLogged
  ){

    page = "login";
  }

  document.querySelectorAll("section")
  .forEach(section=>{
    section.classList.remove("active");
  });

  const target =
  document.getElementById(page);

  if(target){
    target.classList.add("active");
  }

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

/* LOGIN */
function login(){

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  firebase.auth().setPersistence(
    firebase.auth.Auth.Persistence.SESSION
  )

  .then(()=>{

    return firebase.auth()
    .signInWithEmailAndPassword(
      email,
      password
    );

  })

  .then(()=>{

    alert("Connexion réussie ✅");

    show("home");

  })

  .catch(error=>{

    alert(error.message);

  });

}

/* LOGOUT */
function logout(){

  firebase.auth().signOut()

  .then(()=>{

    isLogged = false;

    alert("Déconnecté ✅");

    show("home");

  });

}

/* UPLOAD IMAGE */
function uploadImage(){

  if(!isLogged){

    show("login");

    return;
  }

  const file =
  document.getElementById("imageFile").files[0];

  if(!file){

    alert("Choisis une image");

    return;
  }

  const reader = new FileReader();

  reader.onload = function(e){

    db.collection("gallery").add({

      url:e.target.result,
      created:Date.now()

    });

  };

  reader.readAsDataURL(file);

}

/* LOAD IMAGES */
db.collection("gallery")
.orderBy("created","desc")
.onSnapshot(snapshot=>{

  const images =
  document.getElementById("images");

  if(!images) return;

  images.innerHTML = "";

  snapshot.forEach(doc=>{

    const url = doc.data().url;

    images.innerHTML += `

      <div class="gallery-card">

        <img src="${url}">

        <button
        class="download-btn"
        onclick="downloadImage('${url}')">

        Télécharger ⬇️

        </button>

      </div>

    `;

  });

});

/* DOWNLOAD */
function downloadImage(url){

  const a = document.createElement("a");

  a.href = url;

  a.download = "image.jpg";

  a.click();

}

/* EVENTS */
db.collection("events")
.orderBy("created","desc")
.onSnapshot(snapshot=>{

  const list =
  document.getElementById("list");

  if(!list) return;

  list.innerHTML = "";

  snapshot.forEach(doc=>{

    const e = doc.data();

    list.innerHTML += `

      <div class="event-card">

        <h3>${e.title || ""}</h3>

        <p>📅 ${e.date || ""}</p>

        <p>📍 ${e.place || ""}</p>

        <button class="participate-btn">
        Participer 🌿
        </button>

      </div>

    `;

  });

});

</script>

</body>
</html>
