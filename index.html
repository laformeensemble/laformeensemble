<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyC9Onkj0aUzHoQ4LQI5phaMFlNqTbQM74o",
  authDomain: "la-form-ensemble.firebaseapp.com",
  projectId: "la-form-ensemble"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const protectedPages = ["gallery","gazette"];

/* NAVIGATION */
function show(page){

  const user = firebase.auth().currentUser;

  // 🔒 seulement ces pages sont protégées
  if(protectedPages.includes(page) && !user){
    page = "login";
  }

  document.querySelectorAll("section")
  .forEach(s => s.classList.remove("active"));

  const target = document.getElementById(page);
  if(target) target.classList.add("active");

  window.scrollTo(0,0);
}

/* LOGIN */
function login(){

  firebase.auth()
  .signInWithEmailAndPassword(email.value, password.value)
  .then(()=>show("gallery"))
  .catch(e=>alert(e.message));

}

/* AUTH CONTROL (IMPORTANT) */
firebase.auth().onAuthStateChanged(user => {

  const galContent = document.getElementById("galContent");
  const gazContent = document.getElementById("gazContent");

  if(user){

    if(galContent) galContent.style.display = "block";
    if(gazContent) gazContent.style.display = "block";

  } else {

    if(galContent) galContent.style.display = "none";
    if(gazContent) gazContent.style.display = "none";

  }

});

</script>
