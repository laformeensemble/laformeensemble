<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Form'Ensemble</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body {font-family: Arial; margin:0; background:#0b1220; color:white; text-align:center;}
div {padding:20px;}
button {padding:10px 20px; margin-top:10px;}
input {padding:10px; margin:5px;}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPage">
<h2>Connexion</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<br>
<button onclick="login()">Se connecter</button>
</div>

<!-- 👋 WELCOME -->
<div id="welcomePage" style="display:none">
<h1>Bienvenue 👋</h1>
<button onclick="goHome()">Aller à l'accueil</button>
</div>

<!-- 🏠 HOME -->
<div id="homePage" style="display:none">
<h2>Accueil</h2>
<button onclick="openGazette()">Gazette de Montsouris</button>
</div>

<!-- 📄 GAZETTE -->
<div id="gazettePage" style="display:none">

<h2>Gazette de Montsouris</h2>

<iframe 
src="https://drive.google.com/file/d/ID_DU_PDF/preview"
width="90%" height="600px">
</iframe>

<br>
<button onclick="goHome()">Retour accueil</button>
</div>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "TON_API_KEY",
  authDomain: "TON_PROJECT.firebaseapp.com",
  projectId: "TON_PROJECT"
};

firebase.initializeApp(firebaseConfig);

// 🔐 LOGIN
function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
  .then(() => {
    show("welcomePage");
  })
  .catch(() => {
    alert("Erreur connexion");
  });

}

// 🧭 NAVIGATION
function goHome(){
  show("homePage");
}

function openGazette(){
  show("gazettePage");
}

// 📦 SHOW PAGE
function show(page){

  document.getElementById("loginPage").style.display = "none";
  document.getElementById("welcomePage").style.display = "none";
  document.getElementById("homePage").style.display = "none";
  document.getElementById("gazettePage").style.display = "none";

  document.getElementById(page).style.display = "block";
}

</script>

</body>
</html>
