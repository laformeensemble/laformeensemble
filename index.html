<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Form'Ensemble</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}
nav{padding:15px;background:#111827;display:flex;gap:10px;flex-wrap:wrap;}
nav button{padding:10px;}
section{display:none;padding:20px;}
.active{display:block;}
iframe{width:100%;height:600px;border:none;}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<button onclick="show('home')">Accueil</button>
<button onclick="show('about')">À propos</button>
<button onclick="show('contact')">Contact</button>
<button onclick="show('events')">Événements</button>
<button onclick="show('login')">Gazette</button>
</nav>

<!-- 🟢 PUBLIC -->
<section id="home" class="active">
<h1>Accueil</h1>
<p>Bienvenue sur La Form'Ensemble</p>
</section>

<section id="about">
<h1>À propos</h1>
<p>Sport adapté pour les personnes diabétiques.</p>
</section>

<section id="contact">
<h1>Contact</h1>
<p>contact@laformensemble.fr</p>
</section>

<section id="events">
<h1>Événements</h1>
<p>Prochaines activités à venir...</p>
</section>

<!-- 🔐 LOGIN -->
<section id="login">
<h1>Connexion Gazette</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Mot de passe"><br><br>

<button onclick="login()">Se connecter</button>
</section>

<!-- 📄 GAZETTE (PROTÉGÉE) -->
<section id="gazette">

<h1>Gazette de Montsouris</h1>

<iframe 
src="https://drive.google.com/file/d/1Xn_5gDcavRwtXvewPYmLnjp6zUtEw0Nz/view?usp=sharing/preview">
</iframe>

<br><br>
<button onclick="logout()">Se déconnecter</button>

</section>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC9Onkj0aUzHoQ4LQI5phaMFlNqTbQM74o",
  authDomain: "la-form-ensemble.firebaseapp.com",
  projectId: "la-form-ensemble"
};

firebase.initializeApp(firebaseConfig);

// 🧭 NAVIGATION PUBLIC
function show(page){

  document.querySelectorAll("section").forEach(s=>{
    s.classList.remove("active");
  });

  document.getElementById(page).classList.add("active");

}

// 🔐 LOGIN
function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email,password)
  .then(()=>{
    show("gazette");
  })
  .catch(()=>{
    alert("Erreur connexion");
  });

}

// 🚪 LOGOUT
function logout(){
  firebase.auth().signOut();
  show("home");
}

</script>

</body>
</html>
