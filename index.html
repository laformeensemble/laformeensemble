<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Form'Ensemble</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* NAV MOBILE */
nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-size:14px;
}

/* PAGES */
section{
  display:none;
  padding:20px;
  padding-bottom:90px;
}

.active{
  display:block;
}

/* CARD */
.card{
  background:#1f2937;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* BUTTON */
button{
  padding:10px;
  width:100%;
  background:#4ade80;
  border:none;
  margin-top:5px;
}

/* IMAGE */
img{
  width:100%;
  border-radius:10px;
}

iframe{
  width:100%;
  height:500px;
  border:none;
}

</style>
</head>

<body>

<!-- 🟢 ACCUEIL -->
<section id="home" class="active">
<h2>Accueil</h2>
<div class="card">Bienvenue sur La Form'Ensemble 🌿</div>
</section>

<!-- 🟢 À PROPOS -->
<section id="about">
<h2>À propos</h2>
<div class="card">Sport adapté pour diabétiques</div>
</section>

<!-- 🟢 ÉVÉNEMENTS -->
<section id="events">
<h2>Événements</h2>
<div id="list"></div>
</section>

<!-- 🟢 CONTACT -->
<section id="contact">
<h2>Contact</h2>
<div class="card">contact@laformensemble.fr</div>
</section>

<!-- 🔒 GAZETTE -->
<section id="gazette">
<h2>Gazette 🔒</h2>

<div id="gazBlocked">Connexion requise</div>

<div id="gazContent" style="display:none">

<iframe src="https://drive.google.com/file/d/ID_DU_PDF/preview"></iframe>

</div>
</section>

<!-- 🔒 GALERIE -->
<section id="gallery">
<h2>Galerie 📸</h2>

<div id="galBlocked">Connexion requise</div>

<div id="galContent" style="display:none">

<div class="card">
<input id="imgUrl" placeholder="Lien image">
<button onclick="addImage()">Ajouter</button>
</div>

<div id="images"></div>

</div>
</section>

<!-- NAV -->
<nav>
<button onclick="show('home')">Accueil</button>
<button onclick="show('about')">À propos</button>
<button onclick="show('events')">Événements</button>
<button onclick="show('contact')">Contact</button>
<button onclick="show('gazette')">Gazette</button>
<button onclick="show('gallery')">Galerie</button>
</nav>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyC9Onkj0aUzHoQ4LQI5phaMFlNqTbQM74o",
  authDomain: "la-form-ensemble.firebaseapp.com",
  projectId: "la-form-ensemble"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* NAVIGATION */
function show(page){

  document.querySelectorAll("section").forEach(s=>{
    s.classList.remove("active");
  });

  document.getElementById(page).classList.add("active");

}

/* AUTH */
firebase.auth().onAuthStateChanged(user => {

  if(user){

    document.getElementById("gazBlocked").style.display = "none";
    document.getElementById("gazContent").style.display = "block";

    document.getElementById("galBlocked").style.display = "none";
    document.getElementById("galContent").style.display = "block";

  }else{

    document.getElementById("gazBlocked").style.display = "block";
    document.getElementById("gazContent").style.display = "none";

    document.getElementById("galBlocked").style.display = "block";
    document.getElementById("galContent").style.display = "none";

  }

});

/* AJOUT IMAGE */
function addImage(){

  const url = document.getElementById("imgUrl").value;

  db.collection("gallery").add({
    url:url,
    created:Date.now()
  });

}

/* LOAD IMAGES */
db.collection("gallery")
.orderBy("created","desc")
.onSnapshot(snapshot=>{

  let div = document.getElementById("images");
  div.innerHTML="";

  snapshot.forEach(doc=>{
    div.innerHTML += `
      <div class="card">
        <img src="${doc.data().url}">
      </div>
    `;
  });

});

/* EVENTS */
db.collection("events")
.orderBy("created","desc")
.onSnapshot(snapshot=>{

  let list = document.getElementById("list");
  list.innerHTML="";

  snapshot.forEach(doc=>{
    let e = doc.data();

    list.innerHTML += `
      <div class="card">
        <h3>${e.title || ""}</h3>
        <p>${e.date || ""}</p>
        <p>${e.place || ""}</p>
      </div>
    `;
  });

});

</script>

</body>
</html>
